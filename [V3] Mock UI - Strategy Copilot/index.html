<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Content Strategy Copilot - Landing Mock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 18% 8%, rgba(99, 102, 241, 0.18), transparent 28%),
          radial-gradient(circle at 85% 10%, rgba(34, 211, 238, 0.12), transparent 26%),
          #060b1a;
      }

      .panel {
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(10, 15, 30, 0.92));
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 30px 50px rgba(0, 0, 0, 0.35);
      }

      .node {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(192, 132, 252, 0.7);
        box-shadow: 0 0 16px rgba(192, 132, 252, 0.9);
      }

      .pulse {
        animation: pulse 2.3s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.55), 0 0 22px rgba(251, 191, 36, 0.35);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(251, 191, 36, 0), 0 0 24px rgba(251, 191, 36, 0.5);
        }
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
      const ScoreCircle = ({ label, score, tag, color }) => (
        <div className="flex items-center gap-3 rounded-2xl border border-slate-700/80 bg-slate-900/70 px-3 py-2">
          <div
            className={`grid h-14 w-14 place-items-center rounded-full border text-sm font-bold ${color}`}
          >
            {score}
          </div>
          <div>
            <p className="text-xs text-slate-400">{label}</p>
            <p className="text-sm font-semibold text-slate-100">{tag}</p>
          </div>
        </div>
      );

      const SignalCard = ({ title, children }) => (
        <div className="rounded-2xl border border-slate-700/70 bg-slate-900/70 p-4">
          <p className="text-sm font-semibold text-slate-100">{title}</p>
          <div className="mt-2 text-xs text-slate-300">{children}</div>
        </div>
      );

      const Bubble = ({ label, className, badge }) => (
        <div className={`absolute grid place-items-center rounded-full border text-[11px] font-semibold ${className}`}>
          <span>{label}</span>
          {badge && (
            <span className="absolute -top-8 left-1/2 -translate-x-1/2 rounded-full border border-amber-300/40 bg-amber-300/15 px-2 py-1 text-[10px] font-bold uppercase tracking-wide text-amber-200">
              {badge}
            </span>
          )}
        </div>
      );

      const App = () => {
        return (
          <div className="relative mx-auto flex min-h-screen max-w-[1600px] items-center justify-center p-10">
            <div className="node left-24 top-20"></div>
            <div className="node left-48 top-28"></div>
            <div className="node right-32 top-20"></div>
            <div className="node right-56 top-32"></div>

            <main className="panel relative h-[1080px] w-[1440px] overflow-hidden rounded-[30px] p-10">
              <header className="text-center">
                <div className="mx-auto mb-5 inline-flex rounded-full border border-violet-300/30 bg-violet-500/15 px-4 py-1 text-[11px] font-semibold tracking-[0.18em] text-violet-200">
                  AI-POWERED ANALYSIS
                </div>
                <h1 className="text-5xl font-bold tracking-tight text-white">Your Channel’s DNA.<br />Decoded by AI.</h1>
                <p className="mx-auto mt-4 max-w-3xl text-base text-slate-300">
                  We analyzed your channel’s content and market trends to reveal what’s working, what’s missing, and your smartest next move.
                </p>
              </header>

              <section className="panel mt-7 flex items-center justify-between rounded-3xl p-5">
                <div className="flex items-center gap-4">
                  <div className="grid h-14 w-14 place-items-center rounded-full bg-gradient-to-br from-violet-500 to-cyan-400 text-lg font-bold text-slate-900">AR</div>
                  <div>
                    <p className="font-semibold text-white">Alex Tech Reviews</p>
                    <p className="text-sm text-slate-400">@AlexTechReviews · 127K subscribers</p>
                    <div className="mt-1 flex flex-wrap gap-3 text-xs text-slate-300">
                      <span>◉ 245 videos analyzed</span>
                      <span>◉ Last 18 months of content</span>
                      <span>◉ Market signals active</span>
                      <span>◉ YouTube + Google Trends</span>
                    </div>
                  </div>
                </div>

                <div className="flex gap-3">
                  <ScoreCircle label="Channel Focus" score="82" tag="High" color="border-violet-300/50 bg-violet-500/15 text-violet-100" />
                  <ScoreCircle label="Audience Alignment" score="76" tag="Good" color="border-cyan-300/50 bg-cyan-500/15 text-cyan-100" />
                  <ScoreCircle label="Growth Opportunity" score="91" tag="Very High" color="border-emerald-300/50 bg-emerald-500/15 text-emerald-100" />
                </div>
              </section>

              <section className="mt-6 grid grid-cols-5 gap-5">
                <div className="panel col-span-3 rounded-3xl p-5">
                  <h2 className="text-xl font-semibold text-white">Channel DNA Map</h2>
                  <p className="text-sm text-slate-400">We mapped your topics by audience interest vs. channel coverage.</p>

                  <div className="relative mt-4 h-[470px] rounded-2xl border border-slate-700/70 bg-slate-950/60">
                    <div className="absolute inset-0">
                      <div className="absolute left-1/2 top-0 h-full w-px bg-slate-700/70"></div>
                      <div className="absolute left-0 top-1/2 h-px w-full bg-slate-700/70"></div>
                    </div>

                    <p className="absolute left-3 top-3 text-[11px] font-medium text-slate-400">Overused Topics <span className="text-slate-500">· You post a lot about these</span></p>
                    <p className="absolute right-3 top-3 text-[11px] font-medium text-slate-300">Core Content <span className="text-slate-500">· Your audience loves these</span></p>
                    <p className="absolute left-3 bottom-3 text-[11px] font-medium text-slate-500">Low Value Topics <span className="text-slate-600">· Low interest & low coverage</span></p>
                    <p className="absolute right-3 bottom-3 text-[11px] font-medium text-amber-200">Hidden Opportunities <span className="text-slate-500">· High interest, less coverage from you</span></p>

                    <p className="absolute bottom-2 left-1/2 -translate-x-1/2 text-xs text-slate-400">Audience Interest · Low → High</p>
                    <p className="absolute left-2 top-1/2 -translate-y-1/2 -rotate-90 text-xs text-slate-400">Channel Coverage · Low → High</p>

                    <Bubble label="Tech News" className="left-[17%] top-[20%] h-20 w-20 border-violet-300/40 bg-violet-400/20 text-violet-100" />
                    <Bubble label="Cheap Accessories" className="left-[68%] top-[22%] h-20 w-20 border-emerald-300/40 bg-emerald-400/20 text-emerald-100" />
                    <Bubble label="Budget Phones" className="left-[60%] top-[9%] h-24 w-24 border-teal-300/45 bg-teal-400/25 text-teal-50" />
                    <Bubble label="AI Tools" className="left-[74%] top-[64%] h-16 w-16 border-amber-300/45 bg-amber-300/20 text-amber-100" />
                    <Bubble label="Laptop Comparisons" badge="Hidden Opportunity" className="pulse left-[58%] top-[53%] h-28 w-28 border-amber-300/70 bg-amber-300/25 text-amber-50" />
                    <div className="absolute left-[20%] top-[75%] h-3 w-3 rounded-full bg-slate-500/50"></div>
                  </div>
                </div>

                <div className="col-span-2 flex flex-col gap-5">
                  <div className="panel rounded-3xl p-5">
                    <h3 className="text-xl font-semibold text-white">Recommended Next Move</h3>
                    <p className="mt-3 text-[11px] uppercase tracking-[0.16em] text-slate-400">Topic</p>
                    <p className="mt-1 text-2xl font-bold text-white">Budget Laptop Comparisons</p>
                    <span className="mt-3 inline-flex rounded-full border border-emerald-300/35 bg-emerald-300/15 px-3 py-1 text-xs font-semibold text-emerald-100">Safe Expansion</span>

                    <ul className="mt-4 space-y-2 text-sm text-slate-200">
                      <li>✓ Strong audience overlap</li>
                      <li>✓ High search growth</li>
                      <li>✓ Low coverage on your channel</li>
                    </ul>

                    <p className="mt-5 text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-400">Next Video Ideas</p>
                    <div className="mt-2 space-y-2 text-sm">
                      <div className="rounded-xl border border-slate-700 bg-slate-900/70 px-3 py-2">Best Budget Laptops Under $600</div>
                      <div className="rounded-xl border border-slate-700 bg-slate-900/70 px-3 py-2">Student Laptop Buying Guide</div>
                      <div className="rounded-xl border border-slate-700 bg-slate-900/70 px-3 py-2">Why Cheap Laptops Fail</div>
                    </div>

                    <div className="mt-5 grid grid-cols-1 gap-2">
                      <button className="rounded-xl bg-gradient-to-r from-violet-500 to-indigo-500 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-violet-500/30">
                        Evaluate This Idea →
                      </button>
                      <button className="rounded-xl border border-violet-300/40 bg-transparent px-4 py-2 text-sm font-semibold text-violet-100">
                        Adjust Channel Strategy →
                      </button>
                    </div>
                    <p className="mt-2 text-xs text-slate-500">Explore idea-level scoring or shift to a broader growth path.</p>
                  </div>

                  <div className="panel rounded-3xl p-5">
                    <h3 className="text-lg font-semibold text-white">Opportunity Signals</h3>
                    <p className="text-sm text-slate-400">Market data that reveals what’s trending and what your audience wants next.</p>
                    <div className="mt-4 grid grid-cols-3 gap-3">
                      <SignalCard title="Market Trend">
                        <p>“Budget laptops”</p>
                        <p>Search demand</p>
                        <p className="mt-1 text-base font-semibold text-violet-200">+38% this month</p>
                        <svg viewBox="0 0 100 35" className="mt-2 h-10 w-full">
                          <polyline fill="none" stroke="#a78bfa" strokeWidth="3" points="5,30 20,27 35,23 50,22 65,16 80,11 95,6" />
                        </svg>
                      </SignalCard>
                      <SignalCard title="Audience Signal">
                        <p>Viewers who watch</p>
                        <p className="font-semibold text-cyan-200">Budget Phones</p>
                        <p>also watch</p>
                        <p className="font-semibold text-indigo-200">Laptop Reviews</p>
                        <div className="relative mt-2 h-12">
                          <div className="absolute left-4 top-1 h-10 w-10 rounded-full border border-cyan-300/60 bg-cyan-400/20"></div>
                          <div className="absolute left-9 top-1 h-10 w-10 rounded-full border border-indigo-300/60 bg-indigo-400/20"></div>
                        </div>
                        <p className="text-[11px] text-slate-400">76% audience overlap</p>
                      </SignalCard>
                      <SignalCard title="Channel Gap">
                        <p>Top competing channels posted</p>
                        <p className="mt-1 text-base font-semibold text-amber-100">12 laptop videos</p>
                        <p>in the last 90 days</p>
                        <div className="mt-2 flex h-14 items-end gap-2">
                          <div className="w-4 rounded-t bg-violet-300" style={{ height: "90%" }}></div>
                          <div className="w-4 rounded-t bg-cyan-300" style={{ height: "68%" }}></div>
                          <div className="w-4 rounded-t bg-slate-500" style={{ height: "30%" }}></div>
                        </div>
                        <p className="mt-1 text-[11px] text-slate-400">Channel A: 12 · Channel B: 9 · Your Channel: 3</p>
                      </SignalCard>
                    </div>
                  </div>
                </div>
              </section>

              <footer className="absolute bottom-4 left-0 w-full text-center text-xs text-slate-500">
                Analysis based on your channel data + YouTube search trends + competing channels
              </footer>
            </main>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
